<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard เอกสารส่วนตัว</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root { 
      --primary: #6200EA; 
      --secondary: #FF007F; 
      --bg-gradient: linear-gradient(135deg, #6200EA 0%, #FF007F 100%); 
      --card-bg: rgba(255, 255, 255, 0.95); 
      --text-main: #1A1A1A; 
      --success: #00E676;
      --warning: #FFD600;
      --danger: #FF5252;
    }

    body { 
      font-family: 'Prompt', sans-serif; 
      background: var(--bg-gradient); 
      color: var(--text-main); 
      padding: 15px; 
      margin: 0; 
      min-height: 100vh;
    }

    .header-section {
      text-align: center;
      color: white;
      margin-bottom: 20px;
      margin-top: 10px;
      animation: fadeInDown 0.6s ease-out;
    }

    .profile-info {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 15px;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    .profile-info img {
      width: 60px; height: 60px;
      border-radius: 50%;
      border: 3px solid var(--secondary);
    }

    .profile-text { text-align: left; }
    .profile-text h3 { margin: 0; font-size: 16px; color: var(--primary); }
    .profile-text p { margin: 0; font-size: 13px; color: #666; }

    /* Summary Bar */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .summary-item {
      background: white;
      padding: 10px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .summary-item i { font-size: 20px; margin-bottom: 5px; }
    .summary-item span { display: block; font-size: 18px; font-weight: 700; }
    .summary-item label { font-size: 10px; color: #888; }

    /* Document Cards */
    .doc-list { display: flex; flex-direction: column; gap: 15px; padding-bottom: 30px; }

    .doc-card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 15px rgba(0,0,0,0.08);
      border-left: 8px solid #DDD;
      transition: transform 0.2s;
    }

    .doc-card.status-ปกติ { border-left-color: var(--success); }
    .doc-card.status-ใกล้หมดอายุ { border-left-color: var(--warning); }
    .doc-card.status-หมดอายุแล้ว { border-left-color: var(--danger); }

    .doc-title {
      font-weight: 600;
      font-size: 17px;
      color: var(--primary);
      margin-bottom: 10px;
      padding-right: 60px;
      line-height: 1.3;
    }

    .doc-details {
      font-size: 13px;
      color: #555;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .days-badge {
      background: #F0F0F0;
      padding: 5px 12px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
      display: inline-block;
      margin-top: 10px;
    }

    .status-badge {
      position: absolute;
      top: 0; right: 0;
      padding: 5px 15px;
      font-size: 10px;
      color: white;
      border-bottom-left-radius: 15px;
      font-weight: 600;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .btn-action {
      flex: 1;
      padding: 10px;
      border-radius: 12px;
      border: none;
      font-family: 'Prompt';
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: 0.3s;
    }

    .btn-view { background: #E3F2FD; color: #1976D2; }
    .btn-view:hover { background: #1976D2; color: white; }
    .btn-no-file { background: #FFF3E0; color: #EF6C00; cursor: not-allowed; opacity: 0.7; }
    .btn-update { background: #F3E5F5; color: var(--primary); }

    /* Loading Overlay */
    #loading {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-gradient);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 1000; color: white;
    }

    .loader {
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      width: 40px; height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

    .empty-state {
      text-align: center; background: white; padding: 40px; border-radius: 20px; margin-top: 20px;
    }
  </style>
</head>
<body>

  <div id="loading">
    <div class="loader" id="spinner"></div>
    <p id="loadingText">กำลังโหลดแดชบอร์ดส่วนตัว...</p>
  </div>

  <div class="header-section">
    <h2 style="margin:0;">🗂️ แดชบอร์ดเอกสาร</h2>
    <p style="font-size:12px; opacity:0.8;">ตรวจสอบและจัดการสถานะเอกสารของคุณ</p>
  </div>

  <div class="profile-info" id="userProfile" style="display:none;">
    <img id="userImg" src="https://via.placeholder.com/60" alt="Profile">
    <div class="profile-text">
      <h3 id="userName">กำลังดึงข้อมูล...</h3>
      <p id="userDept">ผู้ทำรายการ</p>
    </div>
  </div>

  <div class="summary-grid" id="summaryArea" style="display:none;">
    <div class="summary-item">
      <i class="fa-solid fa-file-lines" style="color:var(--primary)"></i>
      <span id="totalDoc">0</span>
      <label>ทั้งหมด</label>
    </div>
    <div class="summary-item">
      <i class="fa-solid fa-clock-rotate-left" style="color:var(--warning)"></i>
      <span id="warnDoc" style="color:var(--warning)">0</span>
      <label>ใกล้หมดอายุ</label>
    </div>
    <div class="summary-item">
      <i class="fa-solid fa-circle-exclamation" style="color:var(--danger)"></i>
      <span id="dangerDoc" style="color:var(--danger)">0</span>
      <label>หมดอายุแล้ว</label>
    </div>
  </div>

  <div class="doc-list" id="docContainer"></div>

  <script>
    // 📌 1. ใส่ LIFF ID (สร้างใหม่สำหรับหน้า Dashboard)
    const MY_LIFF_ID = "2010379470-vQxXyuA8"; 
    
    // 📌 2. ใส่ Web App URL (ตัวเดียวกันกับหน้าฟอร์มกรอกข้อมูล)
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbxkHcKCsM853RD225LZ7wUnxnBZF1D5HoEXnJm7FaLBY8h12oppFDkYmERoQwoTs9cf6w/exec"; 

    window.onload = function() {
      liff.init({ liffId: MY_LIFF_ID }).then(() => {
        if (liff.isLoggedIn()) {
          liff.getProfile().then(profile => {
            document.getElementById('userImg').src = profile.pictureUrl;
            document.getElementById('userName').innerText = profile.displayName;
            fetchDashboard(profile.userId);
          }).catch(err => showError("ไม่สามารถดึงรูปโปรไฟล์ได้"));
        } else { 
          liff.login(); 
        }
      }).catch(err => {
        showError("❌ การตั้งค่า LIFF ID ไม่ถูกต้อง");
      });
    };

    // ฟังก์ชันดึงข้อมูลจาก Google Apps Script
    function fetchDashboard(userId) {
      fetch(`${GAS_API_URL}?action=getDashboard&userId=${userId}`)
        .then(res => res.json())
        .then(data => {
          renderDashboard(data);
          document.getElementById('loading').style.display = 'none';
          document.getElementById('userProfile').style.display = 'flex';
          document.getElementById('summaryArea').style.display = 'grid';
        })
        .catch(error => {
          showError("❌ ระบบหลังบ้านขัดข้อง ไม่สามารถดึงข้อมูลได้ กรุณาลองใหม่");
          console.error(error);
        });
    }

    // ฟังก์ชันแสดงข้อความ Error เวลาระบบค้าง
    function showError(msg) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('loadingText').innerHTML = `<span style="color:#FFD600; font-weight:bold;">${msg}</span><br><br><small>กรุณาตรวจสอบ URL หรือ รีเฟรชหน้าใหม่อีกครั้ง</small>`;
    }

    // ฟังก์ชันวาดการ์ดเอกสาร
    function renderDashboard(docs) {
      const container = document.getElementById('docContainer');
      let total = docs.length, warn = 0, danger = 0;

      if (total === 0) {
        container.innerHTML = `<div class="empty-state">
          <i class="fa-regular fa-folder-open" style="font-size:50px; color:#DDD; margin-bottom:15px; display:block;"></i>
          <p>ยังไม่มีข้อมูลเอกสารในระบบครับ</p>
        </div>`;
        return;
      }

      container.innerHTML = docs.map(doc => {
        if (doc.status === 'ใกล้หมดอายุ') warn++;
        if (doc.status === 'หมดอายุแล้ว') danger++;

        let dayColor = doc.daysLeft < 0 ? 'var(--danger)' : (doc.daysLeft <= 60 ? 'var(--warning)' : 'var(--success)');
        let badgeColor = doc.status === 'ปกติ' ? 'var(--success)' : (doc.status === 'ใกล้หมดอายุ' ? 'var(--warning)' : 'var(--danger)');

        return `
          <div class="doc-card status-${doc.status}">
            <div class="status-badge" style="background:${badgeColor}">${doc.status}</div>
            <div class="doc-title">${doc.docName} <br><small style="color:#888; font-weight:normal; font-size:13px;">${doc.agency || 'ไม่ระบุหน่วยงาน'}</small></div>
            <div class="doc-details">
              <div><i class="fa-regular fa-calendar-check"></i> ออกให้: <br>${doc.startDate}</div>
              <div><i class="fa-regular fa-calendar-xmark"></i> หมดอายุ: <br>${doc.endDate}</div>
            </div>
            <div class="days-badge" style="color:${dayColor}">
              ${doc.daysLeft < 0 ? '🚨 เลยกำหนด ' + Math.abs(doc.daysLeft) : '⌛ เหลือเวลา ' + doc.daysLeft} วัน
            </div>
            <div class="btn-group">
              ${doc.fileUrl ? 
                `<button class="btn-action btn-view" onclick="window.open('${doc.fileUrl}')"><i class="fa-solid fa-paperclip"></i> ดูไฟล์แนบ</button>` : 
                `<button class="btn-action btn-no-file" disabled><i class="fa-solid fa-slash"></i> ไม่มีไฟล์แนบ</button>`
              }
              <button class="btn-action btn-update" onclick="alert('ฟีเจอร์อัปเดตสถานะ กำลังตามมาเร็วๆ นี้ค่ะ!')"><i class="fa-solid fa-pen-to-square"></i> อัปเดต</button>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('totalDoc').innerText = total;
      document.getElementById('warnDoc').innerText = warn;
      document.getElementById('dangerDoc').innerText = danger;
    }
  </script>
</body>
</html>
