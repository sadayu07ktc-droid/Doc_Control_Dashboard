<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard เอกสารส่วนตัว</title>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <style>
    :root { 
      --primary: #6200EA; --secondary: #FF007F; 
      --bg-gradient: linear-gradient(135deg, #6200EA 0%, #FF007F 100%); 
      --success: #00E676; --warning: #FFD600; --danger: #FF5252; --info: #29B6F6;
    }
    body { font-family: 'Prompt', sans-serif; background: var(--bg-gradient); color: #1A1A1A; padding: 15px; margin: 0; min-height: 100vh; }
    
    /* Profile & Search */
    .profile-info { background: rgba(255,255,255,0.95); border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 15px; }
    .profile-info img { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--secondary); }
    .profile-text h3 { margin: 0; font-size: 16px; color: var(--primary); }
    .profile-text p { margin: 0; font-size: 13px; color: #666; }
    
    .search-box { position: relative; margin-bottom: 15px; }
    .search-box input { width: 100%; padding: 12px 15px 12px 40px; border-radius: 15px; border: none; font-family: 'Prompt'; box-sizing: border-box; box-shadow: 0 4px 10px rgba(0,0,0,0.1); outline: none; }
    .search-box i { position: absolute; left: 15px; top: 14px; color: #888; }

    /* 5 Clickable Summary Cards */
    .summary-grid { display: flex; overflow-x: auto; gap: 10px; margin-bottom: 20px; padding-bottom: 5px; scrollbar-width: none; }
    .summary-grid::-webkit-scrollbar { display: none; }
    .summary-item { min-width: 100px; background: white; padding: 12px 10px; border-radius: 15px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; border: 2px solid transparent; }
    .summary-item.active { border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 6px 15px rgba(98,0,234,0.3); }
    .summary-item span { display: block; font-size: 18px; font-weight: 700; margin: 5px 0; }
    .summary-item label { font-size: 11px; color: #666; font-weight: 500; }

    /* Document Cards */
    .doc-list { display: flex; flex-direction: column; gap: 15px; padding-bottom: 30px; }
    .doc-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 15px rgba(0,0,0,0.08); position: relative; }
    .doc-title { font-weight: 600; font-size: 16px; color: var(--primary); line-height: 1.3; }
    .badge-status { position: absolute; top: 15px; right: 15px; padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 600; color: white; }
    .badge-process { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; margin-top: 10px; background: #EEE; color: #555; }
    
    .btn-group { display: flex; gap: 10px; margin-top: 15px; }
    .btn-action { flex: 1; padding: 10px; border-radius: 12px; border: none; font-family: 'Prompt'; font-size: 13px; font-weight: 500; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 5px; }
    .btn-view { background: #E3F2FD; color: #1976D2; }
    .btn-update { background: #F3E5F5; color: var(--primary); }

    /* Modal Popup */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
    .modal-content { background: white; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; }
    .modal select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #CCC; font-family: 'Prompt'; margin: 15px 0; font-size: 15px; }
    .modal-btns { display: flex; gap: 10px; }
    .btn-save { background: var(--primary); color: white; flex: 2; }
    .btn-cancel { background: #DDD; color: #333; flex: 1; }

    #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-gradient); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; color: white; }
    .loader { border: 4px solid rgba(255,255,255,0.3); border-top: 4px solid white; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loading"><div class="loader"></div><p>กำลังโหลดแดชบอร์ด...</p></div>

  <div class="profile-info" id="userProfile" style="display:none;">
    <img id="userImg" src="" alt="Profile">
    <div class="profile-text">
      <h3 id="userName">กำลังโหลด...</h3>
      <p id="userDept">แผนก: ...</p>
    </div>
  </div>

  <div class="search-box">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="searchInput" placeholder="ค้นหาชื่อเอกสาร หรือ หน่วยงาน..." onkeyup="filterData()">
  </div>

  <div class="summary-grid" id="summaryArea" style="display:none;">
    <div class="summary-item active" onclick="setFilter('all', this)">
      <label>ทั้งหมด</label><span id="c-all" style="color:var(--primary)">0</span>
    </div>
    <div class="summary-item" onclick="setFilter('ใกล้หมดอายุ', this)">
      <label>ใกล้หมดอายุ</label><span id="c-warn" style="color:var(--warning)">0</span>
    </div>
    <div class="summary-item" onclick="setFilter('หมดอายุแล้ว', this)">
      <label>หมดอายุแล้ว</label><span id="c-danger" style="color:var(--danger)">0</span>
    </div>
    <div class="summary-item" onclick="setFilter('ยังไม่ดำเนินการ', this)">
      <label>ยังไม่ดำเนินการ</label><span id="c-todo" style="color:#FF9800">0</span>
    </div>
    <div class="summary-item" onclick="setFilter('ยื่นเอกสารแล้ว', this)">
      <label>ยื่นเรื่องแล้ว</label><span id="c-done" style="color:var(--success)">0</span>
    </div>
  </div>

  <div class="doc-list" id="docContainer"></div>

  <div class="modal" id="updateModal">
    <div class="modal-content">
      <h3 style="margin-top:0; color:var(--primary);">📝 อัปเดตสถานะเอกสาร</h3>
      <p id="modalDocName" style="font-size:14px; color:#555;"></p>
      
      <select id="processSelect">
        <option value="ยังไม่ดำเนินการ">🔴 ยังไม่ดำเนินการ</option>
        <option value="กำลังเตรียมเอกสาร">🟡 กำลังเตรียมเอกสาร</option>
        <option value="ยื่นเอกสารแล้ว">🟢 ยื่นเอกสารแล้ว (หยุดการแจ้งเตือน)</option>
        <option value="เสร็จสิ้น">✅ เสร็จสิ้น (หยุดการแจ้งเตือน)</option>
      </select>

      <div class="modal-btns">
        <button class="btn-action btn-cancel" onclick="closeModal()">ยกเลิก</button>
        <button class="btn-action btn-save" onclick="saveProcess()">บันทึกข้อมูล</button>
      </div>
    </div>
  </div>

  <script>
    // 🌟 อย่าลืมใส่ 2 ค่านี้ใหม่นะคะ
    const MY_LIFF_ID = "ใส่_LIFF_ID_ของแดชบอร์ดตรงนี้"; 
    const GAS_API_URL = "ใส่_WEB_APP_URL_จาก_GAS_ตัวใหม่_ตรงนี้"; 
    
    let allDocs = []; 
    let currentFilter = 'all';
    let currentRowIdx = 0;

    window.onload = () => {
      liff.init({ liffId: MY_LIFF_ID }).then(() => {
        if (liff.isLoggedIn()) {
          liff.getProfile().then(profile => {
            document.getElementById('userImg').src = profile.pictureUrl;
            document.getElementById('userName').innerText = profile.displayName; 
            fetchDashboard(profile.userId);
          });
        } else { liff.login(); }
      });
    };

    function fetchDashboard(userId) {
      fetch(`${GAS_API_URL}?action=getDashboard&userId=${userId}`)
        .then(res => res.json())
        .then(data => {
          allDocs = data.docs;
          document.getElementById('userDept').innerText = "แผนก: " + data.empDept; 
          updateCounters();
          renderDocs(allDocs);
          
          document.getElementById('loading').style.display = 'none';
          document.getElementById('userProfile').style.display = 'flex';
          document.getElementById('summaryArea').style.display = 'flex';
        });
    }

    function updateCounters() {
      document.getElementById('c-all').innerText = allDocs.length;
      document.getElementById('c-warn').innerText = allDocs.filter(d => d.status === 'ใกล้หมดอายุ').length;
      document.getElementById('c-danger').innerText = allDocs.filter(d => d.status === 'หมดอายุแล้ว').length;
      document.getElementById('c-todo').innerText = allDocs.filter(d => d.process === 'ยังไม่ดำเนินการ' || !d.process).length;
      document.getElementById('c-done').innerText = allDocs.filter(d => d.process === 'ยื่นเอกสารแล้ว' || d.process === 'เสร็จสิ้น').length;
    }

    function setFilter(type, element) {
      document.querySelectorAll('.summary-item').forEach(el => el.classList.remove('active'));
      element.classList.add('active');
      currentFilter = type;
      filterData();
    }

    function filterData() {
      const searchText = document.getElementById('searchInput').value.toLowerCase();
      
      let filtered = allDocs.filter(doc => {
        const matchText = doc.docName.toLowerCase().includes(searchText) || (doc.agency && doc.agency.toLowerCase().includes(searchText));
        
        let matchBtn = true;
        if (currentFilter === 'ใกล้หมดอายุ') matchBtn = (doc.status === 'ใกล้หมดอายุ');
        else if (currentFilter === 'หมดอายุแล้ว') matchBtn = (doc.status === 'หมดอายุแล้ว');
        else if (currentFilter === 'ยังไม่ดำเนินการ') matchBtn = (doc.process === 'ยังไม่ดำเนินการ' || !doc.process);
        else if (currentFilter === 'ยื่นเอกสารแล้ว') matchBtn = (doc.process === 'ยื่นเอกสารแล้ว' || doc.process === 'เสร็จสิ้น');
        
        return matchText && matchBtn;
      });

      renderDocs(filtered);
    }

    function renderDocs(docs) {
      const container = document.getElementById('docContainer');
      if (docs.length === 0) {
        container.innerHTML = `<div style="text-align:center; padding:30px; background:white; border-radius:20px;">ไม่พบเอกสารที่ค้นหาครับ</div>`;
        return;
      }

      container.innerHTML = docs.map(doc => {
        let badgeColor = doc.status === 'ปกติ' ? 'var(--success)' : (doc.status === 'ใกล้หมดอายุ' ? 'var(--warning)' : 'var(--danger)');
        let processColor = (doc.process === 'ยื่นเอกสารแล้ว' || doc.process === 'เสร็จสิ้น') ? 'var(--success)' : '#FF9800';

        return `
          <div class="doc-card" style="border-left: 6px solid ${badgeColor}">
            <div class="badge-status" style="background:${badgeColor}">${doc.status}</div>
            <div class="doc-title">${doc.docName} <br><small style="color:#888; font-weight:normal;">${doc.agency || '-'}</small></div>
            
            <div class="badge-process" style="color: ${processColor}; border: 1px solid ${processColor}; background: white;">
              <i class="fa-solid fa-spinner"></i> สถานะ: ${doc.process || 'ยังไม่ดำเนินการ'}
            </div>

            <div style="font-size:13px; color:#555; margin-top:15px; display:flex; justify-content:space-between;">
              <span>⏳ เหลือเวลา: <b>${doc.daysLeft} วัน</b></span>
              <span>หมดอายุ: ${doc.endDate}</span>
            </div>

            <div class="btn-group">
              ${doc.fileUrl ? 
                `<button class="btn-action btn-view" onclick="window.open('${doc.fileUrl}')"><i class="fa-solid fa-file"></i> ดูไฟล์</button>` : 
                `<button class="btn-action" style="background:#EEE; color:#AAA;" disabled>ไม่มีไฟล์</button>`}
              <button class="btn-action btn-update" onclick="openModal(${doc.rowIdx}, '${doc.docName}', '${doc.process}')">
                <i class="fa-solid fa-pen"></i> อัปเดตสถานะ
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    function openModal(rowIdx, docName, currentProcess) {
      currentRowIdx = rowIdx;
      document.getElementById('modalDocName').innerText = docName;
      document.getElementById('processSelect').value = currentProcess || 'ยังไม่ดำเนินการ';
      document.getElementById('updateModal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('updateModal').style.display = 'none';
    }

    function saveProcess() {
      const newProcess = document.getElementById('processSelect').value;
      Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

      fetch(GAS_API_URL, {
        method: 'POST',
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ action: 'updateProcess', rowIdx: currentRowIdx, newProcess: newProcess })
      })
      .then(res => res.json())
      .then(res => {
        if(res.status === 'success') {
          Swal.fire({ icon: 'success', title: 'อัปเดตสำเร็จ', confirmButtonColor: '#6200EA' }).then(() => {
            closeModal();
            liff.getProfile().then(p => fetchDashboard(p.userId)); 
          });
        }
      });
    }
  </script>
</body>
</html>
